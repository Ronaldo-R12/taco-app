<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tacos El Takito</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #c0392b; color: white;
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    header h1 { font-size: 22px; }
    header span { font-size: 14px; opacity: 0.85; }

    .container { display: grid; grid-template-columns: 1fr 340px; height: calc(100vh - 60px); }

    .menu-panel { padding: 20px; overflow-y: auto; }
    .menu-panel h2 { font-size: 16px; color: #666; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
    .category { margin-bottom: 24px; }
    .category h3 { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .menu-btn {
      background: white; border: 1.5px solid #ddd;
      border-radius: 12px; padding: 16px 12px;
      text-align: center; cursor: pointer;
      transition: all 0.15s;
    }
    .menu-btn:hover { border-color: #c0392b; background: #fff5f5; }
    .menu-btn:active { transform: scale(0.97); }
    .menu-btn .item-name { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .menu-btn .item-price { font-size: 13px; color: #c0392b; }

    .order-panel {
      background: white; border-left: 1px solid #eee;
      display: flex; flex-direction: column;
    }
    .order-header { padding: 16px 20px; border-bottom: 1px solid #eee; }
    .order-header h2 { font-size: 16px; }
    .order-items { flex: 1; overflow-y: auto; padding: 12px 20px; }
    .order-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }
    .order-item-name { font-size: 14px; font-weight: 500; }
    .order-item-price { font-size: 13px; color: #666; }
    .qty-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px solid #ddd; background: white;
      font-size: 16px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .qty-btn:hover { border-color: #c0392b; color: #c0392b; }
    .qty { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }

    .order-footer { padding: 16px 20px; border-top: 1px solid #eee; overflow-y: auto; }
    .total-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; color: #666; }
    .total-row.grand { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 14px; }

    .payment-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .pay-btn {
      padding: 12px; border-radius: 10px; border: 1.5px solid #ddd;
      background: white; font-size: 14px; cursor: pointer; font-weight: 500;
    }
    .pay-btn.selected { border-color: #c0392b; background: #fff5f5; color: #c0392b; }

    .cash-input { margin-bottom: 10px; display: none; }
    .cash-input input {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid #ddd; font-size: 14px;
    }
    .cash-input input:focus { outline: none; border-color: #c0392b; }
    .change-due { font-size: 13px; color: #27ae60; font-weight: 500; margin-bottom: 10px; display: none; }

    .zelle-qr { display: none; text-align: center; margin-bottom: 10px; }
    .zelle-qr p { font-size: 13px; color: #666; margin-bottom: 8px; }
    .zelle-qr img { width: 180px; height: 180px; border-radius: 12px; border: 1px solid #eee; }

    .charge-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      background: #c0392b; color: white; border: none;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .charge-btn:hover { background: #a93226; }
    .charge-btn:disabled { background: #ccc; cursor: not-allowed; }

    .clear-btn {
      width: 100%; padding: 10px; border-radius: 10px;
      background: white; color: #999; border: 1.5px solid #eee;
      font-size: 13px; cursor: pointer; margin-top: 8px;
    }
    .clear-btn:hover { color: #c0392b; border-color: #c0392b; }

    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #27ae60; color: white; padding: 12px 24px;
      border-radius: 30px; font-size: 14px; font-weight: 500;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>Tacos El Takito</h1>
  <div style="display:flex; align-items:center; gap:16px;">
    <a href="/history" style="font-size:13px; color:white; text-decoration:none; border:1px solid rgba(255,255,255,0.5); padding:6px 14px; border-radius:20px;">Order History</a>
    <a href="/sales" style="font-size:13px; color:white; text-decoration:none; border:1px solid rgba(255,255,255,0.5); padding:6px 14px; border-radius:20px;">Sales</a>

    <span id="clock"></span>
  </div>
</header>

<div class="container">
  <div class="menu-panel">
    <h2>Menu</h2>
    <div id="menu-container"></div>
  </div>

  <div class="order-panel">
    <div class="order-header">
      <h2>Current Order</h2>
    </div>
    <div class="order-items" id="order-items">
      <p style="color:#bbb;font-size:13px;margin-top:12px;">No items yet — tap the menu to add.</p>
    </div>
    <div class="order-footer">
      <div class="total-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="total-row grand"><span>Total</span><span id="total">$0.00</span></div>

      <div class="payment-btns">
        <button class="pay-btn" id="btn-cash" onclick="selectPayment('cash')">Cash</button>
        <button class="pay-btn" id="btn-zelle" onclick="selectPayment('zelle')">Zelle</button>
      </div>

      <div class="cash-input" id="cash-input">
        <input type="number" id="cash-received" placeholder="Cash received ($)" oninput="updateChange()" />
      </div>
      <div class="change-due" id="change-due"></div>

      <div class="zelle-qr" id="zelle-qr">
        <p>Scan to pay with Zelle</p>
        <img src="/static/zelle-qr.jpg" alt="Zelle QR Code" />
      </div>

      <button class="charge-btn" id="charge-btn" onclick="submitOrder()" disabled>Charge</button>
      <button class="clear-btn" onclick="clearOrder()">Clear Order</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let menu = [];
  let order = {};
  let paymentMethod = "";

  async function loadMenu() {
    const res = await fetch("/menu");
    menu = await res.json();
    renderMenu();
  }

  function renderMenu() {
    const container = document.getElementById("menu-container");
    const categories = {};
    menu.forEach(item => {
      if (!categories[item.category]) categories[item.category] = [];
      categories[item.category].push(item);
    });

    container.innerHTML = "";
    for (const [cat, items] of Object.entries(categories)) {
      const section = document.createElement("div");
      section.className = "category";
      section.innerHTML = `<h3>${cat}</h3><div class="items-grid">${
        items.map(item => `
          <button class="menu-btn" onclick="addItem('${item.name}', ${item.price})">
            <div class="item-name">${item.name}</div>
            <div class="item-price">$${item.price.toFixed(2)}</div>
          </button>`).join("")
      }</div>`;
      container.appendChild(section);
    }
  }

  function addItem(name, price) {
    if (order[name]) {
      order[name].qty += 1;
    } else {
      order[name] = { price, qty: 1 };
    }
    renderOrder();
  }

  function changeQty(name, delta) {
    if (!order[name]) return;
    order[name].qty += delta;
    if (order[name].qty <= 0) delete order[name];
    renderOrder();
  }

  function renderOrder() {
    const container = document.getElementById("order-items");
    const items = Object.entries(order);

    if (items.length === 0) {
      container.innerHTML = `<p style="color:#bbb;font-size:13px;margin-top:12px;">No items yet — tap the menu to add.</p>`;
      document.getElementById("subtotal").textContent = "$0.00";
      document.getElementById("total").textContent = "$0.00";
      document.getElementById("charge-btn").disabled = true;
      return;
    }

    container.innerHTML = items.map(([name, { price, qty }]) => `
      <div class="order-item">
        <div>
          <div class="order-item-name">${name}</div>
          <div class="order-item-price">$${(price * qty).toFixed(2)}</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty('${name}', -1)">−</button>
          <span class="qty">${qty}</span>
          <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
        </div>
      </div>`).join("");

    const subtotal = items.reduce((sum, [, { price, qty }]) => sum + price * qty, 0);
    document.getElementById("subtotal").textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById("total").textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById("charge-btn").disabled = paymentMethod === "";
  }

  function selectPayment(method) {
    paymentMethod = method;
    document.getElementById("btn-cash").classList.toggle("selected", method === "cash");
    document.getElementById("btn-zelle").classList.toggle("selected", method === "zelle");
    document.getElementById("cash-input").style.display = method === "cash" ? "block" : "none";
    document.getElementById("change-due").style.display = "none";
    document.getElementById("zelle-qr").style.display = method === "zelle" ? "block" : "none";
    document.getElementById("charge-btn").disabled = Object.keys(order).length === 0;
  }

  function updateChange() {
    const total = Object.entries(order).reduce((sum, [, { price, qty }]) => sum + price * qty, 0);
    const cash = parseFloat(document.getElementById("cash-received").value) || 0;
    const change = cash - total;
    const el = document.getElementById("change-due");
    if (cash > 0) {
      el.style.display = "block";
      el.textContent = change >= 0 ? `Change due: $${change.toFixed(2)}` : `Need $${Math.abs(change).toFixed(2)} more`;
      el.style.color = change >= 0 ? "#27ae60" : "#c0392b";
    }
  }

  async function submitOrder() {
    const items = Object.entries(order).map(([name, { qty }]) => ({ name, quantity: qty }));
    const cash = parseFloat(document.getElementById("cash-received").value) || 0;

    const res = await fetch("/orders", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ items, payment_method: paymentMethod, cash_received: cash })
    });

    const data = await res.json();
    if (data.order_id) {
      showToast(`Order #${data.order_id} complete! Change: $${data.change_due.toFixed(2)}`);
      clearOrder();
    }
  }

  function clearOrder() {
    order = {};
    paymentMethod = "";
    document.getElementById("btn-cash").classList.remove("selected");
    document.getElementById("btn-zelle").classList.remove("selected");
    document.getElementById("cash-input").style.display = "none";
    document.getElementById("change-due").style.display = "none";
    document.getElementById("zelle-qr").style.display = "none";
    document.getElementById("cash-received").value = "";
    renderOrder();
  }

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
  }

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString();
  }

  loadMenu();
  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
