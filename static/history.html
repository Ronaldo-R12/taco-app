<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order History — Tacos El Takito</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #c0392b; color: white;
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    header h1 { font-size: 20px; }
    .back-btn {
      font-size: 13px; color: white; text-decoration: none;
      border: 1px solid rgba(255,255,255,0.5); padding: 6px 14px;
      border-radius: 20px;
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); }

    .summary-bar {
      display: flex; gap: 12px; padding: 16px 24px;
      background: white; border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }
    .summary-card {
      background: #f5f5f5; border-radius: 10px;
      padding: 10px 18px; text-align: center;
    }
    .summary-card .label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.06em; }
    .summary-card .value { font-size: 20px; font-weight: 600; color: #222; margin-top: 2px; }

    .container { max-width: 800px; margin: 0 auto; padding: 20px; }

    .day-section { margin-bottom: 20px; }
    .day-header {
      display: flex; justify-content: space-between; align-items: center;
      background: #c0392b; color: white;
      padding: 12px 18px; border-radius: 10px;
      cursor: pointer; margin-bottom: 8px;
    }
    .day-header:hover { background: #a93226; }
    .day-title { font-size: 15px; font-weight: 600; }
    .day-summary { font-size: 13px; opacity: 0.85; }
    .day-chevron { font-size: 12px; transition: transform 0.2s; }
    .day-chevron.open { transform: rotate(90deg); }
    .day-orders { display: none; }
    .day-orders.open { display: block; }

    .order-card {
      background: white; border-radius: 12px;
      border: 1px solid #eee; margin-bottom: 8px;
      overflow: hidden;
    }
    .order-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; cursor: pointer;
    }
    .order-head:hover { background: #fafafa; }
    .order-id { font-size: 14px; font-weight: 600; color: #222; }
    .order-time { font-size: 12px; color: #999; margin-top: 2px; }
    .order-right { text-align: right; }
    .order-total { font-size: 16px; font-weight: 600; color: #c0392b; }
    .payment-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      display: inline-block; margin-top: 4px;
    }
    .badge-cash { background: #e8f5e9; color: #2e7d32; }
    .badge-zelle { background: #e3f2fd; color: #1565c0; }

    .order-body { padding: 14px 18px; display: none; border-top: 1px solid #f5f5f5; }
    .order-body.open { display: block; }
    .item-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 5px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .item-row:last-child { border-bottom: none; }
    .order-summary { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
    .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 4px; }
    .summary-row.grand { font-weight: 600; color: #222; font-size: 14px; }

    .empty { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }
    .chevron { font-size: 12px; color: #bbb; }
  </style>
</head>
<body>

<header>
  <h1>Order History</h1>
  <a href="/" class="back-btn">← Back to POS</a>
</header>

<div class="summary-bar" id="summary-bar"></div>

<div class="container" id="orders-container"></div>

<script>
  async function loadHistory() {
    const res = await fetch("/orders/history");
    const orders = await res.json();

    if (orders.length === 0) {
      document.getElementById("orders-container").innerHTML = `<div class="empty">No orders yet.</div>`;
      return;
    }

    function getWeekendRange(date) {
        const d = new Date(date);
        const day = d.getDay(); // Sunday = 0, Friday = 5, Saturday = 6

        let friday = new Date(d);

        if (day === 5) {
            friday.setDate(d.getDate());
        } else if (day === 6) {
            friday.setDate(d.getDate() - 1);
        } else if (day === 0) {
            friday.setDate(d.getDate() - 2);
        } else {
            friday.setDate(d.getDate() - ((day + 2) % 7));
        }

        const sunday = new Date(friday);
        sunday.setDate(friday.getDate() + 2);

        return { friday, sunday };
        }

        function sameDay(a, b) {
        return a.getFullYear() === b.getFullYear() &&
                a.getMonth() === b.getMonth() &&
                a.getDate() === b.getDate();
        }

        const today = new Date();
        const { friday, sunday } = getWeekendRange(today);

        const weekendOrders = orders.filter(o => {
        const orderDate = new Date(o.created_at);
        return orderDate >= friday && orderDate <= new Date(sunday.getFullYear(), sunday.getMonth(), sunday.getDate(), 23, 59, 59);
        });

        const weekendRevenue = weekendOrders.reduce((sum, o) => sum + o.total, 0);
        const weekendCashRevenue = weekendOrders
        .filter(o => o.payment_method === "cash")
        .reduce((sum, o) => sum + o.total, 0);
        const weekendZelleRevenue = weekendOrders
        .filter(o => o.payment_method === "zelle")
        .reduce((sum, o) => sum + o.total, 0);

        const weekendLabel = `${friday.toLocaleDateString("en-US", { month: "short", day: "numeric" })} - ${sunday.toLocaleDateString("en-US", { month: "short", day: "numeric" })}`;

        document.getElementById("summary-bar").innerHTML = `
        <div class="summary-card">
            <div class="label">Weekend</div>
            <div class="value" style="font-size:16px;">${weekendLabel}</div>
        </div>
        <div class="summary-card">
            <div class="label">Weekend Orders</div>
            <div class="value">${weekendOrders.length}</div>
        </div>
        <div class="summary-card">
            <div class="label">Weekend Revenue</div>
            <div class="value">$${weekendRevenue.toFixed(2)}</div>
        </div>
        <div class="summary-card">
            <div class="label">Cash Sales</div>
            <div class="value">$${weekendCashRevenue.toFixed(2)}</div>
        </div>
        <div class="summary-card">
            <div class="label">Zelle Sales</div>
            <div class="value">$${weekendZelleRevenue.toFixed(2)}</div>
        </div>
        `;

    const grouped = {};
    orders.forEach(o => {
      const date = o.created_at.split(" ").slice(0, 3).join(" ");
      if (!grouped[date]) grouped[date] = [];
      grouped[date].push(o);
    });

    document.getElementById("orders-container").innerHTML = Object.entries(grouped).map(([date, dayOrders]) => {
      const dayTotal = dayOrders.reduce((sum, o) => sum + o.total, 0);
      const dayId = date.replace(/\s|,/g, "_");
      return `
        <div class="day-section">
          <div class="day-header" onclick="toggleDay('${dayId}')">
            <div>
              <div class="day-title">${date}</div>
              <div class="day-summary">${dayOrders.length} orders · $${dayTotal.toFixed(2)} total</div>
            </div>
            <span class="day-chevron open" id="daychev-${dayId}">▾</span>
          </div>
          <div class="day-orders open" id="day-${dayId}">
            ${dayOrders.map(o => `
              <div class="order-card">
                <div class="order-head" onclick="toggleOrder(${o.id})">
                  <div>
                    <div class="order-id">Order #${o.id}</div>
                    <div class="order-time">${o.created_at}</div>
                  </div>
                  <div class="order-right">
                    <div class="order-total">$${o.total.toFixed(2)}</div>
                    <span class="payment-badge ${o.payment_method === 'cash' ? 'badge-cash' : 'badge-zelle'}">
                      ${o.payment_method.charAt(0).toUpperCase() + o.payment_method.slice(1)}
                    </span>
                  </div>
                  <span class="chevron" id="chev-${o.id}">▸</span>
                </div>
                <div class="order-body" id="body-${o.id}">
                  ${o.items.map(i => `
                    <div class="item-row">
                      <span>${i.quantity}x ${i.name}</span>
                      <span>$${i.line_total.toFixed(2)}</span>
                    </div>
                  `).join("")}
                  <div class="order-summary">
                    <div class="summary-row"><span>Subtotal</span><span>$${o.subtotal.toFixed(2)}</span></div>
                    ${o.payment_method === 'cash' ? `
                      <div class="summary-row"><span>Cash received</span><span>$${o.cash_received.toFixed(2)}</span></div>
                      <div class="summary-row"><span>Change given</span><span>$${o.change_due.toFixed(2)}</span></div>
                    ` : ''}
                    <div class="summary-row grand"><span>Total</span><span>$${o.total.toFixed(2)}</span></div>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }).join("");
  }

  function toggleDay(dayId) {
    const orders = document.getElementById(`day-${dayId}`);
    const chev = document.getElementById(`daychev-${dayId}`);
    const open = orders.classList.toggle("open");
    chev.classList.toggle("open", open);
    chev.textContent = open ? "▾" : "▸";
  }

  function toggleOrder(id) {
    const body = document.getElementById(`body-${id}`);
    const chev = document.getElementById(`chev-${id}`);
    const open = body.classList.toggle("open");
    chev.textContent = open ? "▾" : "▸";
  }

  loadHistory();
</script>

</body>
</html>
